<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Find Your Crop | OptiCrop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

<div class="container">

<a class="navbar-brand fw-bold" href="/">🌿 OptiCrop</a>

<div class="collapse navbar-collapse">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/about">About</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/predict">Find Your Crop</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="text-center text-success mb-4">

Crop Recommendation

</h2>

<form method="POST">

<div class="row">

<div class="col-md-4 mb-3">

<label>Nitrogen (N)</label>

<input
type="number"
step="any"
name="N"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Phosphorus (P)</label>

<input
type="number"
step="any"
name="P"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Potassium (K)</label>

<input
type="number"
step="any"
name="K"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Temperature</label>

<input
type="number"
step="any"
name="temperature"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Humidity</label>

<input
type="number"
step="any"
name="humidity"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Soil pH</label>

<input
type="number"
step="any"
name="ph"
class="form-control"
required>

</div>

<div class="col-md-12 mb-3">

<label>Rainfall</label>

<input
type="number"
step="any"
name="rainfall"
class="form-control"
required>

</div>

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-success btn-lg">

Predict Crop

</button>

</div>

</form>

{% if prediction %}

<div class="alert alert-success text-center mt-4">

<h3>

Recommended Crop

</h3>

<h2>

🌾 {{ prediction }}

</h2>

</div>

{% endif %}

</div>

</div>

<footer class="bg-success text-white text-center p-3 mt-5">

© 2026 OptiCrop | Smart Agricultural Production Optimization Engine

</footer>

</body>

</html>
